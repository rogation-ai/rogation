name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + lint + build + test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # DB-backed integration tests run against a pgvector service
    # container. The harness (test/setup-db.ts) bootstraps `public` on
    # the first setupTestDb() call and truncates between files; see
    # that file's comment for the rationale.

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rogation_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SKIP_ENV_VALIDATION: "true"
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/rogation_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test
