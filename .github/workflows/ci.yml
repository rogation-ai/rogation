name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + lint + build + test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # DB-backed tests are skipped in CI until the harness is refactored.
    # The current design uses isolated per-file schemas (test_<label>) but
    # the tests-under-test call app code (e.g. `provisionAccountForClerkUser`)
    # that uses the global `db` client with default `public` search_path —
    # two different worlds. See TODOS.md ("CI DB test harness refactor").
    # These tests run locally via `bun run test` when TEST_DATABASE_URL is set.

    env:
      SKIP_ENV_VALIDATION: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test
